<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin local — SiteMAINT</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .admin-doc-item{padding:8px;border-bottom:1px solid #eee}
    .admin-doc-actions{margin-top:6px}
    #editor{margin-top:12px}
    #editor input, #editor textarea{width:100%;box-sizing:border-box}
    .controls{margin:12px 0}
  </style>
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main class="container">
    <h1>Administration (Local)</h1>

    <section id="login-form">
      <label>Utilisateur<br><input id="admin-user" type="text" value="admin"></label><br>
      <label>Mot de passe<br><input id="admin-pass" type="password" value="admin123"></label><br>
      <button id="btn-login" class="btn btn-primary">Se connecter</button>
      <p id="login-msg" role="status" aria-live="polite"></p>
    </section>

    <section id="admin-panel" hidden>
      <button id="btn-logout" class="btn">Se déconnecter</button>
      <div class="controls">
        <button id="btn-load" class="btn">Recharger depuis /data/machines.json</button>
        <button id="btn-export" class="btn">Exporter JSON</button>
        <label class="btn">Importer JSON <input id="import-json" type="file" accept="application/json" style="display:none"></label>
      </div>
      <h2>Fiches machines</h2>
      <div id="doc-list">Chargement...</div>
      <button id="btn-new" class="btn btn-secondary">Nouvelle fiche</button>

      <div id="editor" hidden>
        <h3>Édition</h3>
        <input id="doc-id" placeholder="ID (laisser vide pour nouveau)">
        <input id="doc-nom" placeholder="Nom">
        <input id="doc-marque" placeholder="Marque">
        <input id="doc-modele" placeholder="Modèle">
        <input id="doc-categorie" placeholder="Catégorie (electricite, automatisme...)">
        <input id="doc-souscategorie" placeholder="Sous-catégorie">
        <textarea id="doc-description" rows="6" placeholder="Description"></textarea>
        <button id="btn-save" class="btn btn-primary">Sauver</button>
        <button id="btn-cancel" class="btn">Annuler</button>
      </div>
      <p class="muted">Les modifications sont stockées dans votre navigateur (localStorage). Pour les publier sur le site, utilisez le bouton <strong>Exporter JSON</strong> et remplacez le fichier <code>data/machines.json</code> dans le repo (commit).</p>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>

  <script src="/assets/js/config.admin.example.js"></script>
  <script type="module" src="/assets/js/pages/admin-local.js"></script>
  <script src="/assets/js/navigation.js"></script>
</body>
</html>
