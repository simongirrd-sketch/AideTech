<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion — SiteMAINT</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main id="main-content">
    <section class="page-header">
      <div class="container">
        <nav class="breadcrumb" aria-label="Fil d'Ariane">
          <a href="/index.html">Accueil</a><span aria-hidden="true">›</span>
          <span>Connexion</span>
        </nav>
        <h1>Connexion & Inscription</h1>
        <p class="lead">Connectez-vous pour accéder à votre espace. Les administrateurs peuvent gérer les fiches techniques.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="card-grid">
          <div class="card">
            <h2>Se connecter</h2>
            <label for="login-username">Nom d'utilisateur</label>
            <input id="login-username" type="text" class="input" autocomplete="username">
            <label for="login-password">Mot de passe</label>
            <input id="login-password" type="password" class="input" autocomplete="current-password">
            <div style="margin-top:12px">
              <button id="btn-login" class="btn btn-primary">Se connecter</button>
            </div>
            <p id="login-msg" class="muted" aria-live="polite"></p>
          </div>

          <div class="card">
            <h2>Créer un compte</h2>
            <label for="reg-username">Nom d'utilisateur</label>
            <input id="reg-username" type="text" class="input">
            <label for="reg-password">Mot de passe</label>
            <input id="reg-password" type="password" class="input">
            <label for="reg-admin-code">Clé admin (optionnelle)</label>
            <input id="reg-admin-code" type="text" class="input" placeholder="laisser vide sauf admin">
            <div style="margin-top:12px">
              <button id="btn-register" class="btn">S'inscrire</button>
            </div>
            <p class="muted">Si vous possédez la clé d'administration, entrez-la pour créer un compte administrateur.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script>
    // Client-side auth prototype (kept simple). For production use a backend.
    (function(){
      // default admin code (can be overridden by assets/js/config.admin.js that sets window.SITEMAINT_ADMIN_CODE)
      window.SITEMAINT_ADMIN_CODE = window.SITEMAINT_ADMIN_CODE || 'ADMINKY123';

      function getUsers(){
        const raw = localStorage.getItem('sitemaint_users');
        if(!raw){
          const defaults = [
            { username: 'simon', password: 'simon123', role: 'user' },
            { username: 'admin', password: 'admin123', role: 'admin' }
          ];
          localStorage.setItem('sitemaint_users', JSON.stringify(defaults));
          return defaults;
        }
        try{ return JSON.parse(raw);}catch(e){return []}
      }
      function saveUsers(u){ localStorage.setItem('sitemaint_users', JSON.stringify(u)); }

      document.getElementById('btn-login').addEventListener('click', ()=>{
        const user = document.getElementById('login-username').value.trim();
        const pass = document.getElementById('login-password').value;
        const users = getUsers();
        const found = users.find(x=> x.username === user && x.password === pass);
        const msg = document.getElementById('login-msg');
        if(found){
          sessionStorage.setItem('sitemaint_session', JSON.stringify({ username: found.username, role: found.role }));
          // redirect based on role
          if(found.role === 'admin') window.location.href = '/pages/admin-local.html';
          else window.location.href = '/index.html';
        } else {
          msg.textContent = "Nom d'utilisateur ou mot de passe incorrect.";
        }
      });

      document.getElementById('btn-register').addEventListener('click', ()=>{
        const user = document.getElementById('reg-username').value.trim();
        const pass = document.getElementById('reg-password').value;
        const adminCode = document.getElementById('reg-admin-code').value.trim();
        if(!user || !pass){ alert('Remplir tous les champs.'); return; }
        const users = getUsers();
        if(users.find(u=>u.username===user)){ alert("Nom d'utilisateur déjà pris."); return; }
        const role = (adminCode && adminCode === window.SITEMAINT_ADMIN_CODE) ? 'admin' : 'user';
        users.push({ username: user, password: pass, role });
        saveUsers(users);
        alert('Compte créé. Vous êtes maintenant connecté.');
        sessionStorage.setItem('sitemaint_session', JSON.stringify({ username: user, role }));
        if(role === 'admin') window.location.href = '/pages/admin-local.html';
        else window.location.href = '/index.html';
      });
    })();
  </script>

  <script src="/assets/js/navigation.js"></script>
</body>
</html>
